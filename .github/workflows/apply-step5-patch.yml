name: Apply v0.31 Step 5 Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-step5-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Assemble and correct patch transport
        shell: bash
        run: |
          cat .github/step5-patch/part*.b64 | tr -d '\n' > /tmp/step5.b64
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/step5.b64')
          content = path.read_text()
          corrections = {
              'ZXIgPz8gJ+inhOWMmeiwg+W6picpfSD': 'ZXIgPz8gJ+inhOWImeiwg+W6picpfSD',
              'j48c3Bhbj7ppaXpi48L3NwYW4+PHN0cm': 'j48c3Bhbj7ppaXppb88L3NwYW4+PHN0cm',
              'gQUNUSU9OX1RZUEhTLkhBVUxfVE9fQ0': 'gQUNUSU9OX1RZUEVTLkhBVUxfVE9fQ0',
              'J+S8mOWFiOS9o+eUqOW3suWIhumF': 'J+S8mOWFiOS9v+eUqOW3suWIhumF',
          }
          for wrong, right in corrections.items():
              count = content.count(wrong)
              expected = 2 if wrong == 'J+S8mOWFiOS9o+eUqOW3suWIhumF' else 1
              if count != expected:
                  raise SystemExit(f'unexpected correction count for {wrong}: {count}, expected {expected}')
              content = content.replace(wrong, right)
          path.write_text(content)
          PY
          base64 -d /tmp/step5.b64 > /tmp/step5.patch
          echo "b2a093f89b817567d020f2aafc5b4b3bc6ce49310c699762b7065eafbc7c4c7b  /tmp/step5.patch" | sha256sum --check
          git apply --check /tmp/step5.patch
      - name: Apply formal changes and clean temporary files
        shell: bash
        run: |
          git apply /tmp/step5.patch
          rm -rf .github/step5-patch
          rm -f .github/workflows/apply-step5-patch.yml
          rm -f .github/workflows/source-export-v0315.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add action explanation chain and observer UI"
          git push origin HEAD:${{ github.head_ref }}

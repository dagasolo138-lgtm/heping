name: Source Export

on:
  pull_request:

jobs:
  export-replay-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: replay-source-export
          path: |
            test/deterministicKernel.test.js
            test/day60Economy.test.js
            codex.md
          retention-days: 1

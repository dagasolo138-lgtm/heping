name: Source Export v0.31 Step 5

on:
  pull_request:
    branches:
      - main

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: v0315-source-snapshot
          path: |
            src
            test
            scripts
            package.json
            package-lock.json
            index.html
            codex.md
            README.md
            version.json
            .github/workflows/ci.yml
            .github/workflows/stability-audit.yml
          include-hidden-files: true
          retention-days: 1

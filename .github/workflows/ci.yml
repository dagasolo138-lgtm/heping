name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Run non-replay tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t replay_files < <(grep -rlE 'DAY30_FINGERPRINT|DAY60_FINGERPRINT' test --include='*.test.js' | sort)
          if [ "${#replay_files[@]}" -ne 2 ]; then
            printf 'Expected exactly two deterministic replay files, found %s:\n' "${#replay_files[@]}"
            printf '%s\n' "${replay_files[@]}"
            exit 1
          fi
          mapfile -t fast_tests < <(find test -type f -name '*.test.js' -print | sort | grep -vFf <(printf '%s\n' "${replay_files[@]}"))
          if [ "${#fast_tests[@]}" -eq 0 ]; then
            echo 'No non-replay tests found.'
            exit 1
          fi
          printf 'Running %s non-replay test files.\n' "${#fast_tests[@]}"
          node --test "${fast_tests[@]}" | tee fast-tests-output.log
      - name: Upload non-replay test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fast-tests-output
          path: fast-tests-output.log
          if-no-files-found: warn
          retention-days: 7
      - run: npm run build

  replay-day30:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run day-30 deterministic replay
        shell: bash
        run: |
          set -euo pipefail
          file=$(grep -rl 'DAY30_FINGERPRINT' test --include='*.test.js' | head -1)
          test -n "$file"
          node --test "$file" | tee day30-output.log
      - name: Read day-30 fingerprint
        if: always()
        run: |
          fingerprint=$(grep -oE 'DAY30_FINGERPRINT=[a-f0-9]{64}' day30-output.log 2>/dev/null | tail -1 | cut -d= -f2)
          if [ -n "$fingerprint" ]; then echo "DAY30_FINGERPRINT=$fingerprint"; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: day30-replay-output
          path: day30-output.log
          if-no-files-found: warn
          retention-days: 7

  replay-day60:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run day-60 deterministic replay
        shell: bash
        run: |
          set -euo pipefail
          file=$(grep -rl 'DAY60_FINGERPRINT' test --include='*.test.js' | head -1)
          test -n "$file"
          node --test "$file" | tee day60-output.log
      - name: Read day-60 fingerprint
        if: always()
        run: |
          fingerprint=$(grep -oE 'DAY60_FINGERPRINT=[a-f0-9]{64}' day60-output.log 2>/dev/null | tail -1 | cut -d= -f2)
          if [ -n "$fingerprint" ]; then echo "DAY60_FINGERPRINT=$fingerprint"; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: day60-replay-output
          path: day60-output.log
          if-no-files-found: warn
          retention-days: 7

  mobile-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: |
          node --check scripts/mobileBrowserSmoke.js
          node --check scripts/testSpeedBrowserSmoke.js
      - name: Run mobile browser smoke
        run: |
          set +e
          npm run test:mobile-smoke
          status=$?
          if [ -f .artifacts/mobile-smoke-failure.json ]; then
            echo '--- mobile-smoke-failure.json ---'
            cat .artifacts/mobile-smoke-failure.json
          fi
          exit $status
      - name: Run hidden 100x browser smoke
        run: |
          set +e
          node scripts/testSpeedBrowserSmoke.js
          status=$?
          if [ -f .artifacts/test-speed-smoke-failure.json ]; then
            echo '--- test-speed-smoke-failure.json ---'
            cat .artifacts/test-speed-smoke-failure.json
          fi
          exit $status
      - name: Upload mobile smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-browser-smoke
          path: .artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  release-source-snapshot:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0310-release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect release source files
        run: |
          mkdir -p .artifacts/v031-release-source/src/modules/persistence
          cp README.md codex.md version.json .artifacts/v031-release-source/
          cp src/modules/persistence/worldSaveSchema.js .artifacts/v031-release-source/src/modules/persistence/
      - uses: actions/upload-artifact@v4
        with:
          name: v031-release-source
          path: .artifacts/v031-release-source
          retention-days: 1

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Run non-replay tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t replay_files < <(grep -rlE 'DAY30_FINGERPRINT|DAY60_FINGERPRINT' test --include='*.test.js' | sort)
          if [ "${#replay_files[@]}" -ne 2 ]; then
            printf 'Expected exactly two deterministic replay files, found %s:\n' "${#replay_files[@]}"
            printf '%s\n' "${replay_files[@]}"
            exit 1
          fi
          mapfile -t fast_tests < <(find test -type f -name '*.test.js' -print | sort | grep -vFf <(printf '%s\n' "${replay_files[@]}"))
          if [ "${#fast_tests[@]}" -eq 0 ]; then
            echo 'No non-replay tests found.'
            exit 1
          fi
          printf 'Running %s non-replay test files.\n' "${#fast_tests[@]}"
          node --test "${fast_tests[@]}" | tee fast-tests-output.log
      - name: Upload non-replay test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fast-tests-output
          path: fast-tests-output.log
          if-no-files-found: warn
          retention-days: 7
      - run: npm run build

  replay-day30:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run day-30 deterministic replay
        shell: bash
        run: |
          set -euo pipefail
          file=$(grep -rl 'DAY30_FINGERPRINT' test --include='*.test.js' | head -1)
          test -n "$file"
          node --test "$file" | tee day30-output.log
      - name: Read day-30 fingerprint
        if: always()
        run: |
          fingerprint=$(grep -oE 'DAY30_FINGERPRINT=[a-f0-9]{64}' day30-output.log 2>/dev/null | tail -1 | cut -d= -f2)
          if [ -n "$fingerprint" ]; then echo "DAY30_FINGERPRINT=$fingerprint"; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: day30-replay-output
          path: day30-output.log
          if-no-files-found: warn
          retention-days: 7

  replay-day60:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run day-60 deterministic replay
        shell: bash
        run: |
          set -euo pipefail
          file=$(grep -rl 'DAY60_FINGERPRINT' test --include='*.test.js' | head -1)
          test -n "$file"
          node --test "$file" | tee day60-output.log
      - name: Read day-60 fingerprint
        if: always()
        run: |
          fingerprint=$(grep -oE 'DAY60_FINGERPRINT=[a-f0-9]{64}' day60-output.log 2>/dev/null | tail -1 | cut -d= -f2)
          if [ -n "$fingerprint" ]; then echo "DAY60_FINGERPRINT=$fingerprint"; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: day60-replay-output
          path: day60-output.log
          if-no-files-found: warn
          retention-days: 7

  mobile-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: |
          node --check scripts/mobileBrowserSmoke.js
          node --check scripts/testSpeedBrowserSmoke.js
      - name: Run mobile browser smoke
        run: |
          set +e
          npm run test:mobile-smoke
          status=$?
          if [ -f .artifacts/mobile-smoke-failure.json ]; then
            echo '--- mobile-smoke-failure.json ---'
            cat .artifacts/mobile-smoke-failure.json
          fi
          exit $status
      - name: Run hidden 100x browser smoke
        run: |
          set +e
          node scripts/testSpeedBrowserSmoke.js
          status=$?
          if [ -f .artifacts/test-speed-smoke-failure.json ]; then
            echo '--- test-speed-smoke-failure.json ---'
            cat .artifacts/test-speed-smoke-failure.json
          fi
          exit $status
      - name: Upload mobile smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-browser-smoke
          path: .artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  release-apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0310-release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Publish v0.31.0 release files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          def replace_once(path, old, new):
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:90]!r}')
              path.write_text(text.replace(old, new))

          readme = Path('README.md')
          replace_once(readme, '''## 当前版本：v0.30.1

          v0.30.1 是 v0.30.0 世界动力引擎的发布收口版本：统一 README、交接文档、页面构建清单和世界存档应用版本，不改变固定 tick、人物选择或资源结算结果。

          v0.30.0 已完成“世界动力事实层”：每日经济、农业和天气事实会形成压力、机会与共同承诺；共同承诺只能给已有合法任务候选增加有限权重，不能生成非法任务，也不能绕过生存、路线、库存、预留、并发和工具维护约束。
          ''', '''## 当前版本：v0.31.0

          v0.31.0 完成共同承诺自适应响应规划（CARP）：候选行动拥有统一效果描述，组合级劳动力规划器按需求和容量分配响应人数，共同承诺只给已有合法候选增加有限权重；农业、种子、储存建设、土壤休耕和劳动积压形成正式响应闭环。

          人物观察器现在会解释当前行动的调度器、基础效用、共同承诺贡献、劳动力缺口、硬规则、政策约束和替代候选。解释层只读取已经形成的任务，不改变固定 tick、人物选择、资源结算或存档 schema。

          v0.30.0 建立世界动力事实层：每日经济、农业和天气事实形成压力、机会与共同承诺，为 v0.31 的响应规划提供事实输入。
          ''')
          replace_once(readme, '- 桌面端使用地图主视图与右侧观察栏；手机端使用底部观察抽屉。\n', '- 桌面端使用地图主视图与右侧观察栏；手机端使用底部观察抽屉。\n- 人物观察页显示当前行动的促成因素、共同承诺、硬规则、政策约束和替代候选。\n')
          replace_once(readme, '## 验证体系\n', '''## v0.31 共同承诺响应规划

          v0.31 将共同承诺从静态行动映射升级为可解释、受容量约束的响应规划：

          - 全部候选行动拥有统一效果描述，并区分即时、赋能和未来效果；
          - 组合级劳动力规划器计算期望人数、目标人数、当前响应者、剩余需求与容量饱和度；
          - 共同承诺评分同时要求合法候选、正向目标效果、剩余劳动力缺口和可用响应名额，总分仍封顶 18；
          - 达到目标人数、目标完成、无有效效果或无合法响应时停止加分，并保留阻断原因；
          - 种子短缺、雨天播种、成熟收获、储物棚建设、土壤休耕和劳动积压进入正式生产响应；
          - 当前行动解释统一覆盖效用、生存、睡眠、篝火、农业、施工和工具维护调度器。

          共同承诺仍不能创建任务，也不能绕过路线、库存、预留、并发、生存和工具维护硬优先级。

          ## 验证体系
''')
          replace_once(readme, 'v0.30.0 封版验证中，Day 120 推进 171,600 ticks，世界动力、任务生命周期、资源流水、日报、工具、粟种和公共工具保障全部通过校验，无模拟错误或孤儿预留。', 'v0.31.0 封版验证中，Day 30 与 Day 60 确定性指纹保持当前基准；Day 60 batch 1 / 5 / 10 摘要一致；Day 120 推进 171,600 ticks，世界动力、任务生命周期、资源流水、日报、工具、粟种和公共工具保障全部通过校验，无模拟错误或孤儿预留。')
          replace_once(readme, '- 共同承诺目前只覆盖部分生存、木材和储存响应。\n', '- 当前行动解释只保留正在执行任务的轻量快照，不保存完整候选历史。\n')

          codex = Path('codex.md')
          replace_once(codex, '## 当前版本：v0.30.1（v0.31 开发中）', '## 当前版本：v0.31.0')
          replace_once(codex, '- `v0.31` 第五步：统一当前行动原因链与观察器解释，显示促成因素、共同承诺、硬规则、政策约束和替代候选。\n', '- `v0.31` 第五步：统一当前行动原因链与观察器解释，显示促成因素、共同承诺、硬规则、政策约束和替代候选。\n- `v0.31.0`：完成版本清单、README、存档应用版本、构建编号与 sourceCommit 发布收口。\n')
          replace_once(codex, '- v0.30.1 的 `WORLD_SAVE_APP_VERSION` 为 `0.30.1`。', '- v0.31.0 的 `WORLD_SAVE_APP_VERSION` 为 `0.31.0`。')
          replace_once(codex, '- v0.31 前五步没有新增持久化字段，存档 schema 不升级。', '- v0.31.0 没有新增持久化字段，存档 schema 保持 `1`。')
          replace_once(codex, 'v0.31 第四步验证结果：', 'v0.31.0 封版验证结果：')
          replace_once(codex, '''## v0.31 后续步骤

          1. 第六步：完成 v0.31 发布收口，更新 `version.json`、README、存档应用版本和正式版本记录。
          2. 发布前复跑普通 CI、Day 60 多批次和 Day 120 长期审计，确认发布清单与 sourceCommit。
          ''', '''## v0.32 建议方向

          1. 将草棚、储物棚和农田边界纳入空间占用与寻路障碍，建立统一可通行性事实。
          2. 在不破坏固定 tick 与确定性的前提下，设计地图空间规划算法，处理道路、建筑、农田和聚落扩张。
          ''')
          replace_once(codex, '- `v0.31`（开发中）：已完成候选效果目录、组合级劳动力规划、承诺评分、生产链响应闭环与当前行动解释；下一步完成正式发布收口。', '- `v0.31.0`：完成候选效果目录、组合级劳动力规划、承诺评分、农业与生产链响应闭环、当前行动解释和正式发布收口。')

          schema = Path('src/modules/persistence/worldSaveSchema.js')
          replace_once(schema, "export const WORLD_SAVE_APP_VERSION = '0.30.1';", "export const WORLD_SAVE_APP_VERSION = '0.31.0';")

          manifest = {
              'schemaVersion': 1,
              'project': '生灵',
              'version': 'v0.31.0',
              'buildId': 'v0.31.0-carp-release-20260715-01',
              'sourceCommit': '9cfb2a137f4b20d6367f20e2e05a932559e16ce1',
              'branch': 'main',
              'verificationPath': '/heping/version.json',
              'verification': {
                  'method': 'Open this manifest with a cache-busting query parameter and compare buildId plus sourceCommit with the deployed page readout.',
                  'cachePolicy': 'The page fetches this file with cache: no-store and a cacheBust query parameter.',
                  'sourceCommitPolicy': 'sourceCommit points to the squash-merged v0.31 feature-complete action-explanation commit on main. This release-alignment commit only updates documentation, the build manifest and the non-schema save app version.',
              },
          }
          Path('version.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n')
          PY
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/v031-release-audit.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md codex.md src/modules/persistence/worldSaveSchema.js version.json .github/workflows/ci.yml .github/workflows/v031-release-audit.yml
          git commit -m "release: publish v0.31.0"
          git push origin HEAD:${{ github.head_ref }}
